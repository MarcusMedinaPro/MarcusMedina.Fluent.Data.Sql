# Full kvalitetskontroll på test-grenen — körs innan merge till main.
# Säkerhetsscanners körs i separata workflows (security-code-scan.yml, osv-scanner.yml).

name: 🔍 Test — Full Quality Gate

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: 1️⃣ Build & Test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ./csharp

      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ./csharp

      - name: Test
        run: |
          dotnet test \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger trx
        working-directory: ./csharp

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: '**/TestResults/**/*.trx'

  test-matrix:
    needs: build-and-test
    name: 2️⃣ Cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Test
        run: dotnet test --configuration Release
        working-directory: ./csharp

  codeql:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: 3️⃣ CodeQL

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore
        working-directory: ./csharp

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: dotnet build --configuration Release --no-restore
        working-directory: ./csharp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  pack:
    needs: [test-matrix, codeql]
    runs-on: ubuntu-latest
    name: 4️⃣ Pack

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Pack
        run: dotnet pack --configuration Release --output ./artifacts
        working-directory: ./csharp

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: ./csharp/artifacts/*.nupkg
